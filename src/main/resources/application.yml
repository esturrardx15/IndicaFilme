spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://Blade:BladeIndicaPontoKom@bladeindica.lhazjyp.mongodb.net/indicafilmes?retryWrites=true&w=majority&appName=BladeIndica}
  application:
    name: indica-filmes
  web:
    resources:
      cache:
        period: 86400

server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
    mime-type: text/html,text/css,application/javascript,application/json,image/svg+xml

logging:
  level:
    br.com.blade.indicafilme: ${LOG_LEVEL:INFO}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    enabled: ${SWAGGER_ENABLED:false}

tmdb:
  api-key: ${TMDB_API_KEY:}
  base-url: https://api.themoviedb.org/3

admin:
  api-key: ${ADMIN_API_KEY:indica-filmes-admin-secret-2026}

cors:
  allowed-origins: ${CORS_ORIGINS:}

# Actuator (Health Check)
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never