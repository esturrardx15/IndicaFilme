name: Security Scanning

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan on Sunday at midnight

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Check for Vulnerabilities with OWASP Dependency-Check
      run: |
        mvn org.owasp:dependency-check-maven:check \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -DfailBuildOnCVSS=7 || true
    
    - name: SNYK Security Scan
      uses: snyk/actions/maven@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      continue-on-error: true
    
    - name: Sonar Code Quality Analysis
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=IndicaFilmeGIT
          -Dsonar.organization=seu-org
    
    - name: Lint and Static Analysis
      run: mvn clean compile spotbugs:check
      continue-on-error: true

